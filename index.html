<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App</title>
  <link rel="stylesheet" href="/public/styles.css" />
</head>
<body>
    <div id="auth-view" class="auth-view">
      <div class="auth-card">
        <h1 class="auth-title">Chat App</h1>
        <div class="auth-tabs">
          <button type="button" class="auth-tab active" data-tab="login">Login</button>
          <button type="button" class="auth-tab" data-tab="register">Registration</button>
        </div>
        <div class="auth-forms">
          <form id="login-form" class="auth-form">
            <input type="email" id="login-email" placeholder="Email" required />
            <input type="password" id="login-password" placeholder="Password" required />
            <button type="submit" class="btn btn-primary">Login</button>
          </form>
          <form id="register-form" class="auth-form hidden">
            <input type="text" id="register-displayName" placeholder="Display Name" required />
            <input type="email" id="register-email" placeholder="Email" required />
            <input type="password" id="register-password" placeholder="Password (min. 6 characters)" required />
            <button type="submit" class="btn btn-primary">Registration</button>
          </form>
        </div>
      </div>
    </div>

    <div id="chat-view" class="hidden chat-view">
      <div class="chat-layout">
        <aside class="chat-sidebar">
          <h3 class="chat-sidebar-title">Users</h3>
          <ul id="users-list"></ul>
          <button id="logout-btn" class="logout-btn-bottom">Logout</button>
        </aside>
        <main class="chat-main">
          <div id="conversation-placeholder" class="conversation-placeholder">
            Select a user to chat with.
          </div>
          <div id="conversation-panel" class="conversation-panel hidden">
            <header class="conversation-header">
              <h2 id="conversation-title" class="conversation-title">—</h2>
            </header>
            <section class="conversation-chart-section" aria-labelledby="chart-heading">
              <h3 id="chart-heading" class="conversation-chart-heading">Messages in last 24h (by hour)</h3>
              <div id="conversation-chart-container" class="conversation-chart-container"></div>
            </section>
            <ul id="messages-list" class="messages-list"></ul>
            <form id="message-form" class="message-form">
              <input type="text" id="message-input" class="message-input" placeholder="Message..." autocomplete="off" />
              <button type="submit" class="btn btn-send">Send</button>
            </form>
          </div>
        </main>
      </div>
    </div>
  
    <script src="./dist/bundle.js"></script>
  </body>
</html>
