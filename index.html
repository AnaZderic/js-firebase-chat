<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App</title>
  <link rel="stylesheet" href="/public/styles.css" />
</head>
<body>
    <div id="auth-view" class="auth-view">
      <div class="auth-card">
        <h1 class="auth-title">Chat App</h1>
        <div class="auth-tabs">
          <button type="button" class="auth-tab active" data-tab="login">Login</button>
          <button type="button" class="auth-tab" data-tab="register">Registration</button>
        </div>
        <div class="auth-forms">
          <form id="login-form" class="auth-form">
            <input type="email" id="login-email" placeholder="Email" required />
            <input type="password" id="login-password" placeholder="Password" required />
            <button type="submit" class="btn btn-primary">Login</button>
          </form>
          <form id="register-form" class="auth-form hidden">
            <input type="text" id="register-displayName" placeholder="Display Name" required />
            <input type="email" id="register-email" placeholder="Email" required />
            <input type="password" id="register-password" placeholder="Password (min. 6 characters)" required />
            <button type="submit" class="btn btn-primary">Registration</button>
          </form>
        </div>
      </div>
    </div>

    <div id="chat-view" class="hidden chat-view">
      <h3>Users List (Real-time)</h3>
      <ul id="users-list"></ul>
      <button id="logout-btn">Logout</button>
    </div>
  
    <script src="./dist/bundle.js"></script>
  </body>
</html>
